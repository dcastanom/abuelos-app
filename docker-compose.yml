services:
  mongodb:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: abuelos

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      - mongodb
    env_file:
      - .env
    environment:
      MONGODB_URL: mongodb://mongodb:27017
      MONGODB_DB: abuelos
    volumes:
      - ./backend/app:/app/app
      - ./backend/seed.py:/app/seed.py
      - ./uploads:/app/uploads
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  mongodb_data:
